name: Build Mac App

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean -y зЊ«зЊ«йІЁ.spec

      - name: Archive macOS App
        run: |
          cd dist
          ditto -c -k --keepParent зЊ«зЊ«йІЁ.app зЊ«зЊ«йІЁ-macOS.zip

      - name: Upload Mac Artifact
        uses: actions/upload-artifact@v4
        with:
          name: зЊ«зЊ«йІЁ-macOS
          path: dist/зЊ«зЊ«йІЁ-macOS.zip
