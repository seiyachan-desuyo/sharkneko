name: Build macOS App

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'archive/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 pyinstaller requests openai
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Ensure icon exists
      run: |
        if [ ! -f "web/box.icns" ]; then
          echo "Warning: web/box.icns not found, ignoring icon parameter."
          pyinstaller --name "CatShark_Mac" --windowed --noconsole --add-data "ui:ui" --add-data "audio:audio" main.py
        else
          pyinstaller --name "CatShark_Mac" --windowed --noconsole --icon "web/box.icns" --add-data "ui:ui" --add-data "audio:audio" main.py
        fi

    - name: Archive production artifacts
      uses: actions/upload-artifact@v4
      with:
        name: CatShark_macOS
        path: dist/CatShark_Mac.app
        if-no-files-found: warn
