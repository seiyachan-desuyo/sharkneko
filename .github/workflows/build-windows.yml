name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'archive/**'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 pyinstaller
        if (Test-Path requirements.txt) { pip install -r requirements.txt }

    - name: Build with PyInstaller
      run: |
        if (!(Test-Path audio)) { New-Item -ItemType Directory -Force -Path audio }
        
        # 移除 --windowed 等参数，加入 --onefile 确保生成单个 exe 文件
        # 将输出格式调整为单文件可执行文件，这也是大多数用户想要的。
        pyinstaller --name "CatShark_Win" --onefile --noconsole --icon "web/box.ico" --add-data "ui;ui" --add-data "audio;audio" main.py

    - name: Inspect dist directory
      run: |
        # 调试用：查看 dist 目录下到底生成了什么
        Get-ChildItem -Path dist\

    - name: Archive production artifacts
      uses: actions/upload-artifact@v4
      with:
        name: CatShark_Windows
        # 因为变成了 onefile，所以路径直接是 dist 目录下的内容，保险起见抓取整个 dist
        path: dist/CatShark_Win.exe
        if-no-files-found: warn
